<svg viewBox="0 0 540 370" xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <defs>
        <linearGradient id="phoneGrad" x1="0" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#2d2d2d"/>
        </linearGradient>
        <clipPath id="frameClip"><rect x="0" y="0" width="540" height="370"/></clipPath>
        <pattern id="catPat" patternUnits="objectBoundingBox" width="1" height="1">
            <image href="/static/image/cat.png" width="70" height="70"/>
        </pattern>
        <pattern id="dogPat" patternUnits="objectBoundingBox" width="1" height="1">
            <image href="/static/image/dog.png" width="70" height="70"/>
        </pattern>
    </defs>
    <!-- Phone frame -->
    <rect x="2.5" y="2.5" width="535" height="420" rx="50" ry="50" fill="url(#phoneGrad)" stroke="#3a3a3a" stroke-width="5" clip-path="url(#frameClip)"/>
    <!-- Side buttons -->
    <rect x="538" y="120" width="4" height="35" rx="2" fill="#2a2a2a"/>
    <rect x="-2" y="100" width="4" height="60" rx="2" fill="#2a2a2a"/>
    <rect x="-2" y="170" width="4" height="35" rx="2" fill="#222"/>
    <!-- Conversation background -->
    <path d="M 17 55 Q 17 17 55 17 L 485 17 Q 523 17 523 55 L 523 370 L 17 370 Z" fill="#393939"/>
    <!-- Notch -->
    <path d="M 210 0 L 330 0 L 330 12 Q 330 32 310 32 L 230 32 Q 210 32 210 12 Z" fill="#0a0a0a"/>
    <circle cx="232" cy="16" r="4" fill="#1a3a1a"/>
    <rect x="258" y="13" width="45" height="6" rx="3" fill="#1a1a1a"/>
    <!-- Status bar -->
    <image href="/static/image/yourplace-logo.svg" x="410" y="25" width="22" height="22"/>
    <text id="iphoneStatusClock" x="436" y="44" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif" font-size="20" font-weight="600" fill="#D3D3D3">12:45</text>
    <!-- Chat bubble 1 (left) -->
    <rect x="35" y="75" width="370" height="115" rx="20" ry="20" fill="#525252"/>
    <polygon points="50,190 50,226 86,190" fill="#525252"/>
    <foreignObject x="35" y="75" width="370" height="115">
        <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;width:100%;height:100%;padding:0 20px;box-sizing:border-box;">
            <p style="color:#D3D3D3;font-size:24px;margin:0;font-family:-apple-system,sans-serif;text-shadow:2px 2px 4px rgba(0,0,0,0.5);line-height:1.4;">Where social media finally lives up to its promise</p>
        </div>
    </foreignObject>
    <!-- Cat profile -->
    <rect x="35" y="245" width="70" height="70" rx="5" fill="url(#catPat)"/>
    <!-- Dog profile -->
    <rect x="433" y="120" width="70" height="70" rx="5" fill="url(#dogPat)"/>
    <!-- Chat bubble 2 (right) -->
    <rect x="135" y="245" width="370" height="100" rx="20" ry="20" fill="#525252"/>
    <polygon points="488,245 488,209 452,245" fill="#525252"/>
    <foreignObject x="135" y="245" width="370" height="100">
        <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;width:100%;height:100%;padding:0 20px;box-sizing:border-box;">
            <p style="color:#D3D3D3;font-size:24px;margin:0;font-family:-apple-system,sans-serif;text-shadow:2px 2px 4px rgba(0,0,0,0.5);line-height:1.4;">Your data. Your relationships. Your rules.</p>
        </div>
    </foreignObject>
</svg>
